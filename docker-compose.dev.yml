services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_tm
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-talleres_mecanicos}
    ports:
      - "5401:5432"
    volumes:
      - ./docker/data/postgres_prd:/var/lib/postgresql/data
    networks:
      - app_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_container
    restart: always
    ports:
      - "5454:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com # Agregado espacio después de :
      PGADMIN_DEFAULT_PASSWORD: root # Agregado espacio después de :
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks: # <--- ESTO FALTABA
      - app_network # <--- Para que pueda ver al servicio 'db

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - app_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: backend
    depends_on:
      - postgres
      - redis
    environment:
#      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/talleres_mecanicos?schema=public
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/talleres_mecanicos?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: development
      JWT_SECRET: "customtokensecret"
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: uploads
    ports:
      - "3001:9999"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - app_network

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./docker/data/minio:/data
    command: server /data --console-address ":9001"
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
      NODE_ENV: development
    ports:
      - "3000:3000"

    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: nginx
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  # postgres_data:
  pgadmin-data:
