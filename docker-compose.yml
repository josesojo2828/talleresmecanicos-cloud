services:
  # --- INFRAESTRUCTURA (Siempre activa) ---
  postgres:
    image: ${IMAGE_POSTGRES:-postgres:15-alpine}
    container_name: ${CONTAINER_NAME_POSTGRES:-postgres_tallerres}
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT_EXTERNAL}:${POSTGRES_PORT_INTERNAL}"
    volumes:
      - ${POSTGRES_VOLUME_PRD:-./docker/data/postgres_prd}:/var/lib/postgresql/data
    networks:
      tm_network:
        aliases:
          - db

  redis:
    image: ${IMAGE_REDIS:-redis:alpine}
    container_name: ${CONTAINER_NAME_REDIS:-redis_talleres}
    restart: always
    ports:
      - "${REDIS_PORT_EXTERNAL}:${REDIS_PORT_INTERNAL}"
    networks:
      - tm_network

  minio:
    image: ${IMAGE_MINIO:-minio/minio}
    container_name: ${CONTAINER_NAME_MINIO:-minio_talleres}
    restart: always
    ports:
      - "${MINIO_PORT_API}:9000"
      - "${MINIO_PORT_CONSOLE}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ${MINIO_DATA_PATH:-./docker/data/minio}:/data
    command: server /data --console-address ":9001"
    networks:
      - tm_network

  pgadmin:
    image: ${IMAGE_PGADMIN:-dpage/pgadmin4}
    container_name: ${CONTAINER_NAME_PGADMIN:-pgadmin_talleres}
    restart: always
    ports:
      - "${PGADMIN_PORT_EXTERNAL}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    networks:
      - tm_network

  nginx:
    image: ${IMAGE_NGINX:-nginx:alpine}
    container_name: ${CONTAINER_NAME_NGINX:-nginx_talleres}
    restart: always
    volumes:
      - ${NGINX_CONF_PATH:-./docker/nginx.conf}:/etc/nginx/nginx.conf:ro
    ports:
      - "${NGINX_PORT_EXTERNAL}:80"
    depends_on:
      - postgres
      - redis
    networks:
      - tm_network

  # --- BACKEND (NestJS) ---
  backend-dev:
    profiles: ["dev"]
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: backend_dev
    ports:
      - "3001:9999"
    depends_on:
      - postgres
      - redis
    environment: &backend-env
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT_INTERNAL}
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_EXTERNAL_ENDPOINT: ${MINIO_EXTERNAL_ENDPOINT}
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      tm_network:
        aliases:
          - backend

  backend:
    profiles: ["prod"]
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: ${CONTAINER_NAME_BACKEND:-backend_talleres}
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - "3001:9999"
    environment:
      <<: *backend-env
      NODE_ENV: production
    networks:
      tm_network:
        aliases:
          - backend

  # --- FRONTEND (Next.js) ---
  frontend-dev:
    profiles: ["dev"]
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: frontend_dev
    depends_on:
      - backend-dev
    environment: &frontend-env
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      tm_network:
        aliases:
          - frontend

  frontend:
    profiles: ["prod"]
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: ${CONTAINER_NAME_FRONTEND:-frontend_talleres}
    restart: always
    depends_on:
      - backend
    environment:
      <<: *frontend-env
      NODE_ENV: production
    networks:
      tm_network:
        aliases:
          - frontend

networks:
  tm_network:
    name: ${NETWORK_NAME:-tm_network}
    driver: bridge
