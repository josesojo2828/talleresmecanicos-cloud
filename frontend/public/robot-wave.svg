<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Robot asistente">
  <!-- Antena -->
  <line x1="32" y1="6" x2="32" y2="14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="4.5" r="3" fill="currentColor" opacity="0.9"/>

  <!-- Cabeza -->
  <rect x="14" y="14" width="36" height="26" rx="7" fill="currentColor" opacity="0.95"/>

  <!-- Ojos (visor) -->
  <rect x="19" y="20" width="10" height="8" rx="3" fill="white" opacity="0.9"/>
  <rect x="35" y="20" width="10" height="8" rx="3" fill="white" opacity="0.9"/>

  <!-- Pupila izquierda -->
  <circle cx="24" cy="24" r="2.5" fill="currentColor"/>
  <!-- Pupila derecha -->
  <circle cx="40" cy="24" r="2.5" fill="currentColor"/>

  <!-- Boca sonriente -->
  <path d="M23 35 Q32 41 41 35" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.85"/>

  <!-- Cuerpo -->
  <rect x="20" y="42" width="24" height="14" rx="5" fill="currentColor" opacity="0.85"/>

  <!-- Indicador cuerpo -->
  <circle cx="32" cy="49" r="3" fill="white" opacity="0.5"/>

  <!-- Brazo izquierdo (quieto) -->
  <rect x="9" y="42" width="9" height="5" rx="2.5" fill="currentColor" opacity="0.8"/>

  <!-- Brazo derecho (saludando — animado con CSS) -->
  <g style="transform-origin: 55px 42px; animation: wave 1.4s ease-in-out infinite;">
    <rect x="46" y="38" width="9" height="5" rx="2.5" fill="currentColor" opacity="0.9" transform="rotate(-30 55 42)"/>
  </g>

  <style>
    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      30%       { transform: rotate(-28deg); }
      60%       { transform: rotate(10deg); }
    }
  </style>
</svg>
