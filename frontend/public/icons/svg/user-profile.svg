<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="user-profile-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>
    <filter id="user-profile-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Circle (Glass) -->
  <circle cx="12" cy="12" r="10" stroke="white" stroke-opacity="0.1" stroke-width="1" fill="url(#user-profile-grad)" fill-opacity="0.05" />
  <!-- Body -->
  <path d="M12 12C14.7614 12 17 14.2386 17 17V18H7V17C7 14.2386 9.23858 12 12 12Z" stroke="url(#user-profile-grad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#user-profile-glow)" />
  <!-- Head -->
  <circle cx="12" cy="8" r="3" stroke="url(#user-profile-grad)" stroke-width="1.5" filter="url(#user-profile-glow)" />
  <!-- Glass Accent Overlay -->
  <rect x="9" y="14" width="6" height="2" rx="1" fill="white" fill-opacity="0.2" />
</svg>
